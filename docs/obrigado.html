<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Mensagem enviada com sucesso para a Fenicks." />
    <title>Obrigado pelo contato | Fenicks</title>
    <link rel="icon" href="images/marca/favicon.png" type="image/png" />
    <link rel="canonical" href="https://www.fenicks.com.br/obrigado.html" />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

    <style>
        :root {
            --brand-dark: #101217;
            --brand-light: #f5f7fb;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top right, #e5ebf5 0%, #f7f9fc 45%, #eef2f8 100%);
            display: grid;
            place-items: center;
            padding: 1.5rem;
        }

        .thanks-card {
            max-width: 640px;
            width: 100%;
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
            background: #fff;
        }

        .logo {
            max-width: 220px;
            width: 100%;
            height: auto;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: .75rem;
            justify-content: center;
        }
    </style>
</head>

<body>
    <main class="card thanks-card p-4 p-md-5 text-center" aria-labelledby="titulo-obrigado">
        <img src="images/marca/fenicks-logo-preto.png" class="logo mx-auto mb-3" width="220" height="60" alt="Fenicks" />
        <h1 id="titulo-obrigado" class="h2 mb-3">Mensagem enviada com sucesso</h1>
        <p class="lead mb-4">Obrigado pelo contato. Nossa equipe retornará em breve para entender sua demanda e propor
            a melhor solução.</p>

        <div class="actions">
            <a href="/" class="btn btn-dark">Voltar para o site</a>
            <a href="https://wa.me/5511993115760?text=Ol%C3%A1%2C%20acabei%20de%20enviar%20o%20formul%C3%A1rio%20e%20gostaria%20de%20falar%20com%20a%20Fenicks."
                class="btn btn-outline-success" target="_blank" rel="noopener">Continuar no WhatsApp</a>
        </div>
    </main>
</body>

</html>
